<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Bruno Tasks — Gerenciador de tarefas pessoal">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Bruno Tasks</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      /* Apple Dark Mode palette */
      --bg:          #000000;
      --bg-grouped:  #1c1c1e;
      --bg-elevated: #2c2c2e;
      --bg-tertiary: #3a3a3c;
      --bg-fill:     #48484a;
      --separator:   rgba(84,84,88,0.34);
      --label:       #ffffff;
      --label-2:     rgba(235,235,245,0.6);
      --label-3:     rgba(235,235,245,0.3);
      --label-4:     rgba(235,235,245,0.16);

      /* System Colors */
      --blue:    #0a84ff;
      --green:   #30d158;
      --orange:  #ff9f0a;
      --red:     #ff453a;
      --pink:    #ff375f;
      --purple:  #bf5af2;
      --cyan:    #64d2ff;
      --gray:    #98989d;
      --teal:    #6ac4dc;
      --indigo:  #5e5ce6;

      --r:  12px;
      --r2: 16px;
      --t:  0.2s ease;
    }

    html { height:100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.47;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LAYOUT ===== */
    .app { max-width: 640px; margin: 0 auto; padding: 0 16px 140px; }

    /* ===== HEADER ===== */
    .header { padding: 56px 4px 4px; }
    .greeting {
      font-size: 0.82rem; font-weight: 500;
      color: var(--label-3); margin-bottom: 2px;
    }
    .header h1 {
      font-size: 2rem; font-weight: 700;
      letter-spacing: -0.04em; color: var(--label);
    }

    /* ===== STATS ===== */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin: 24px 0 20px; padding: 0 4px;
    }
    .stat {
      background: var(--bg-grouped);
      border-radius: var(--r); padding: 16px 14px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat-val {
      font-size: 1.7rem; font-weight: 700;
      letter-spacing: -0.03em; line-height: 1;
    }
    .stat-val.c-pending { color: var(--blue); }
    .stat-val.c-doing   { color: var(--orange); }
    .stat-val.c-done    { color: var(--green); }
    .stat-lbl {
      font-size: 0.7rem; font-weight: 500;
      color: var(--label-3); text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ===== PROGRESS ===== */
    .progress-row {
      display: flex; align-items: center; gap: 12px;
      padding: 0 4px; margin-bottom: 24px;
    }
    .progress-track {
      flex: 1; height: 4px; background: var(--bg-elevated);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; border-radius: 2px;
      background: var(--blue);
      transition: width 0.5s cubic-bezier(0.25,1,0.5,1);
    }
    .progress-pct {
      font-size: 0.78rem; font-weight: 600;
      color: var(--label-2); min-width: 34px; text-align: right;
    }

    /* ===== CATEGORY CHIPS ===== */
    .cats {
      display: flex; gap: 8px; padding: 0 4px; margin-bottom: 14px;
      overflow-x: auto; scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0; display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 20px;
      background: var(--bg-grouped);
      color: var(--label-2); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: var(--t);
      user-select: none; -webkit-user-select: none;
      border: none; font-family: inherit;
    }
    .chip:hover { background: var(--bg-elevated); }
    .chip.active {
      background: var(--chip-c);
      color: #fff;
    }
    .chip .chip-icon {
      width: 16px; height: 16px; display: flex;
      align-items: center; justify-content: center;
    }
    .chip .chip-icon svg { width: 14px; height: 14px; }
    .chip.active .chip-icon svg { stroke: #fff; }
    .chip-n {
      font-size: 0.68rem; font-weight: 600;
      background: rgba(255,255,255,0.12); border-radius: 6px;
      padding: 1px 6px; margin-left: 1px;
    }

    /* ===== SEGMENTED CONTROL (status) ===== */
    .seg-wrap {
      background: var(--bg-grouped); border-radius: 10px;
      padding: 3px; display: flex; margin: 0 4px 12px;
    }
    .seg {
      flex: 1; padding: 7px 0; text-align: center;
      font-size: 0.78rem; font-weight: 500;
      color: var(--label-3); background: transparent;
      border: none; border-radius: 8px;
      cursor: pointer; transition: var(--t);
      font-family: inherit;
    }
    .seg.active {
      background: var(--bg-elevated);
      color: var(--label);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ===== SEARCH ===== */
    .search-wrap {
      margin: 0 4px 14px; position: relative;
    }
    .search-wrap input {
      width: 100%; padding: 10px 14px 10px 36px;
      background: var(--bg-grouped);
      border: none; border-radius: 10px;
      color: var(--label); font-family: inherit;
      font-size: 0.86rem; outline: none;
      transition: var(--t);
    }
    .search-wrap input::placeholder { color: var(--label-3); }
    .search-wrap input:focus {
      box-shadow: 0 0 0 2px var(--blue);
    }
    .search-wrap .s-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--label-3);
    }

    /* ===== TASK LIST ===== */
    .list {
      background: var(--bg-grouped);
      border-radius: var(--r2);
      overflow: hidden;
    }
    .list:empty { background: transparent; }

    .task-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 52px 20px; color: var(--label-3);
    }
    .task-empty .ei {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .task-empty .ei svg { width: 24px; height: 24px; color: var(--label-3); }
    .task-empty h3 { font-size: 0.95rem; font-weight: 600; color: var(--label-2); margin-bottom: 3px; }
    .task-empty p { font-size: 0.82rem; }

    /* ===== TASK ITEM ===== */
    .item {
      padding: 14px 16px;
      transition: background 0.15s ease;
      position: relative;
      animation: fadeUp 0.3s cubic-bezier(0.25,1,0.5,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .item + .item { border-top: 0.5px solid var(--separator); }
    .item:active { background: var(--bg-elevated); }
    .item.completed { opacity: 0.4; }
    .item.completed .item-title { text-decoration: line-through; color: var(--label-3); }

    .item-row { display: flex; align-items: flex-start; gap: 12px; }

    /* Checkbox */
    .ck {
      flex-shrink: 0; width: 22px; height: 22px; margin-top: 1px;
      border-radius: 50%; border: 2px solid var(--label-3);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      color: transparent;
    }
    .ck:hover { border-color: var(--blue); }
    .ck.on {
      border-color: var(--green); background: var(--green); color: #fff;
      animation: ckPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes ckPop {
      0% { transform:scale(1); } 50% { transform:scale(1.25); } 100% { transform:scale(1); }
    }
    .ck svg { width: 12px; height: 12px; stroke-width: 3; }

    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 0.88rem; font-weight: 500;
      line-height: 1.4; margin-bottom: 6px;
    }
    .item-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 6px;
      font-size: 0.68rem; font-weight: 600;
    }
    .badge-cat {
      background: var(--bc); color: var(--bct);
    }
    .badge-cat svg { width: 11px; height: 11px; }

    .meta-txt {
      font-size: 0.72rem; font-weight: 500;
      color: var(--label-3);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .meta-txt svg { width: 12px; height: 12px; }
    .meta-txt.overdue { color: var(--red); }
    .meta-txt.doing { color: var(--orange); }

    .pdot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
    }
    .pdot.alta  { background: var(--red); box-shadow: 0 0 6px rgba(255,69,58,0.4); }
    .pdot.media { background: var(--orange); }
    .pdot.baixa { background: var(--green); }

    /* Notes preview */
    .note-preview {
      margin: 8px 0 0 34px; padding: 8px 10px;
      background: var(--bg-elevated); border-radius: 8px;
      font-size: 0.78rem; color: var(--label-2);
      line-height: 1.45;
    }

    /* Subtasks */
    .subs {
      margin: 8px 0 0 34px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sub {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 0.8rem; color: var(--label-2);
    }
    .sub-ck {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--label-3); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--t); color: transparent; flex-shrink: 0;
    }
    .sub-ck.on { border-color: var(--green); background: var(--green); color: #fff; }
    .sub-ck svg { width: 9px; height: 9px; stroke-width: 3; }
    .sub.done span { text-decoration: line-through; color: var(--label-3); }

    /* Actions */
    .item-acts {
      display: flex; gap: 0; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .item:hover .item-acts { opacity: 1; }
    @media(hover:none) { .item-acts { opacity: 1; } }

    .a-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: none; background: transparent; color: var(--label-3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--t);
    }
    .a-btn:hover { background: var(--bg-tertiary); color: var(--label); }
    .a-btn.del:hover { color: var(--red); }
    .a-btn svg { width: 15px; height: 15px; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--blue);
      border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(10,132,255,0.4);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 90;
    }
    .fab svg { width: 22px; height: 22px; transition: transform 0.25s ease; }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(10,132,255,0.5); }
    .fab:hover svg { transform: rotate(90deg); }
    .fab:active { transform: scale(0.93); }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      position: fixed; z-index: 201;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-grouped);
      border-radius: 14px 14px 0 0;
      padding: 12px 20px 36px;
      max-height: 90dvh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1);
    }
    .modal.open { transform: translateY(0); }

    @media(min-width:640px) {
      .modal {
        top: 50%; bottom: auto; left: 50%;
        transform: translate(-50%,-46%) scale(0.95);
        opacity: 0; border-radius: 14px;
        max-width: 440px; width: 92%;
        transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      }
      .modal.open {
        transform: translate(-50%,-50%) scale(1);
        opacity: 1;
      }
    }

    .m-bar {
      width: 36px; height: 5px; border-radius: 3px;
      background: var(--bg-fill); margin: 4px auto 16px;
    }
    @media(min-width:640px) { .m-bar { display: none; } }

    .m-title {
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 20px;
    }

    .fld { margin-bottom: 14px; }
    .fld label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--label-3); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .fld input, .fld select, .fld textarea {
      width: 100%; padding: 11px 14px;
      background: var(--bg-elevated);
      border: none; border-radius: 10px;
      color: var(--label); font-family: inherit;
      font-size: 0.86rem; outline: none;
      transition: var(--t);
    }
    .fld input:focus, .fld select:focus, .fld textarea:focus {
      box-shadow: 0 0 0 2px var(--blue);
    }
    .fld select { cursor: pointer; }
    .fld textarea { resize: vertical; min-height: 52px; }
    .fld-row { display: flex; gap: 10px; }
    .fld-row .fld { flex: 1; }

    /* Subtask edit */
    .sub-edit-section { margin-bottom: 14px; }
    .sub-edit-section > label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--label-3); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sub-edit-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .sub-edit-row { display: flex; align-items: center; gap: 8px; }
    .sub-edit-row input {
      flex: 1; padding: 8px 12px;
      background: var(--bg-elevated); border: none;
      border-radius: 8px; color: var(--label);
      font-family: inherit; font-size: 0.82rem; outline: none;
    }
    .sub-edit-row input:focus { box-shadow: 0 0 0 2px var(--blue); }
    .sub-rm {
      width: 28px; height: 28px; border-radius: 7px;
      border: none; background: transparent; color: var(--label-3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--t);
    }
    .sub-rm:hover { color: var(--red); background: rgba(255,69,58,0.1); }
    .add-sub-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; background: transparent;
      border: 1px dashed var(--separator);
      border-radius: 8px; color: var(--label-3);
      font-size: 0.8rem; cursor: pointer;
      transition: var(--t); font-family: inherit; width: 100%;
    }
    .add-sub-btn:hover { border-color: var(--blue); color: var(--blue); }

    .m-btns { display: flex; gap: 10px; margin-top: 22px; }
    .btn {
      flex: 1; padding: 13px; border-radius: 12px;
      font-family: inherit; font-size: 0.88rem; font-weight: 600;
      border: none; cursor: pointer; transition: var(--t);
    }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-blue:hover { opacity: 0.85; }
    .btn-sec { background: var(--bg-elevated); color: var(--label-2); }
    .btn-sec:hover { background: var(--bg-tertiary); }

    /* ===== CONFIRM ===== */
    .cf-wrap {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
    }
    .cf-wrap.open { display: flex; }
    .cf-box {
      background: var(--bg-grouped); border-radius: 14px;
      padding: 24px; text-align: center;
      max-width: 300px; width: 85%;
      animation: fadeUp 0.25s ease;
    }
    .cf-box h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .cf-box p { color: var(--label-2); font-size: 0.84rem; margin-bottom: 18px; }
    .btn-red { background: var(--red); color: #fff; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 96px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--bg-elevated);
      color: var(--label); padding: 10px 20px;
      border-radius: 12px; font-size: 0.84rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 400;
      opacity: 0; transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 0; }

    /* ===== RESPONSIVE ===== */
    @media(min-width:640px) {
      .app { padding: 0 24px 120px; }
      .fab { bottom: 32px; right: calc(50% - 320px + 24px); }
    }

    /* ===== CELEBRATION ===== */
    .pop {
      position: fixed; top: 45%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 500;
      animation: popAnim 0.7s ease forwards;
    }
    .pop svg { width: 48px; height: 48px; color: var(--green); }
    @keyframes popAnim {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(0.4); }
      50%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
      100% { opacity:0; transform:translate(-50%,-70%) scale(1.2); }
    }
  </style>
</head>

  </symbol>
  <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </symbol>
  <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
  </symbol>
  <symbol id="i-cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </symbol>
  <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </symbol>
  <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="i-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
  </symbol>
  <symbol id="i-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
  </symbol>
</svg>

<div class="app">
  <header class="header">
    <div class="greeting" id="greeting"></div>
    <h1>Tarefas</h1>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val c-pending" id="sP">0</div>
      <div class="stat-lbl">Pendentes</div>
    </div>
    <div class="stat">
      <div class="stat-val c-doing" id="sD">0</div>
      <div class="stat-lbl">Em progresso</div>
    </div>
    <div class="stat">
      <div class="stat-val c-done" id="sF">0</div>
      <div class="stat-lbl">Concluídas</div>
    </div>
  </div>

  <div class="progress-row">
    <div class="progress-track">
      <div class="progress-bar" id="pBar" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="pPct">0%</div>
  </div>

  <div class="cats" id="cats"></div>

  <div class="seg-wrap">
    <button class="seg active" data-s="all">Todas</button>
    <button class="seg" data-s="todo">A fazer</button>
    <button class="seg" data-s="doing">Fazendo</button>
    <button class="seg" data-s="done">Feitas</button>
  </div>

  <div class="search-wrap">
    <svg class="s-icon"><use href="#i-search"/></svg>
    <input type="text" id="q" placeholder="Buscar...">
  </div>

  <div class="list" id="list"></div>
</div>

<button class="fab" id="fab" title="Nova tarefa">
  <svg><use href="#i-plus"/></svg>
</button>

<div class="overlay" id="ov"></div>
<div class="modal" id="modal">
  <div class="m-bar"></div>
  <div class="m-title" id="mTitle">Nova Tarefa</div>
  <form id="form">
    <input type="hidden" id="fId">
    <div class="fld">
      <label>Título</label>
      <input type="text" id="fT" placeholder="O que precisa ser feito?" required>
    </div>
    <div class="fld-row">
      <div class="fld">
        <label>Categoria</label>
        <select id="fC"></select>
      </div>
      <div class="fld">
        <label>Prioridade</label>
        <select id="fP">
          <option value="alta">Alta</option>
          <option value="media" selected>Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
    </div>
    <div class="fld-row">
      <div class="fld">
        <label>Prazo</label>
        <input type="date" id="fD">
      </div>
      <div class="fld">
        <label>Status</label>
        <select id="fS">
          <option value="todo">A Fazer</option>
          <option value="doing">Fazendo</option>
          <option value="done">Feita</option>
        </select>
      </div>
    </div>
    <div class="sub-edit-section">
      <label>Subtarefas</label>
      <div class="sub-edit-list" id="subList"></div>
      <button type="button" class="add-sub-btn" id="addSub">
        <svg width="14" height="14"><use href="#i-plus"/></svg>
        Adicionar subtarefa
      </button>
    </div>
    <div class="fld">
      <label>Notas</label>
      <textarea id="fN" placeholder="Detalhes, links, anotações..."></textarea>
    </div>
    <div class="m-btns">
      <button type="button" class="btn btn-sec" id="mCancel">Cancelar</button>
      <button type="submit" class="btn btn-blue">Salvar</button>
    </div>
  </form>
</div>

<div class="cf-wrap" id="cfWrap">
  <div class="cf-box">
    <h3>Excluir Tarefa</h3>
    <p>Essa ação não pode ser desfeita.</p>
    <div class="m-btns">
      <button class="btn btn-sec" id="cfNo">Cancelar</button>
      <button class="btn btn-red" id="cfYes">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CATEGORIES =====
const CATS = [
  { id:'familia',     name:'Família',        icon:'i-heart',    color:'#ff375f' },
  { id:'solvay',      name:'Solvay',         icon:'i-building', color:'#64d2ff' },
  { id:'manual',      name:'Manual do Óleo', icon:'i-droplet',  color:'#ff9f0a' },
  { id:'revviu',      name:'Revviu',         icon:'i-rocket',   color:'#bf5af2' },
  { id:'imobiliario', name:'Imobiliário',    icon:'i-home',     color:'#30d158' },
  { id:'financeiro',  name:'Financeiro',     icon:'i-wallet',   color:'#ff453a' },
  { id:'pessoal',     name:'Pessoal',        icon:'i-user',     color:'#98989d' },
];

const DEFAULTS = [
  { id:uid(), title:'Efetivar o empréstimo', category:'financeiro', priority:'alta', status:'todo', date:'', notes:'', subtasks:[] },
  { id:uid(), title:'Tarefa PID', category:'solvay', priority:'media', status:'todo', date:'', notes:'', subtasks:[] },
  { id:uid(), title:'Adicionar WhatsApp do site', category:'manual', priority:'media', status:'todo', date:'', notes:'', subtasks:[] },
  { id:uid(), title:'Agrupar métricas de acompanhamento e dashboards do site', category:'manual', priority:'media', status:'todo', date:'', notes:'', subtasks:[] },
];

let tasks = load();
let aCat = 'all', aSt = 'all', q = '', delId = null, mSubs = [];

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }
function load() {
  const d = localStorage.getItem('bt-v3');
  if (d) return JSON.parse(d);
  save(DEFAULTS); return [...DEFAULTS];
}
function save(t) { localStorage.setItem('bt-v3', JSON.stringify(t||tasks)); }
function ci(id) { return CATS.find(c=>c.id===id)||{name:id,icon:'i-layers',color:'#98989d'}; }
function toast(m) {
  const el=$('#toast'); el.textContent=m;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200);
}
function fDate(d) {
  if(!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function isOD(d) {
  if(!d) return false;
  const t=new Date(); t.setHours(0,0,0,0);
  return new Date(d+'T00:00:00')<t;
}
function pop() {
  const el=document.createElement('div');
  el.className='pop';
  el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 13 10 17 19 7"/></svg>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// Greeting
function setGreeting() {
  const h=new Date().getHours();
  let g='Boa noite, Bruno';
  if(h>=5&&h<12) g='Bom dia, Bruno';
  else if(h>=12&&h<18) g='Boa tarde, Bruno';
  const now=new Date();
  const ds=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  $('#greeting').textContent=g+' · '+ds.charAt(0).toUpperCase()+ds.slice(1);
}

// Stats
function renderStats() {
  const p=tasks.filter(t=>t.status==='todo').length;
  const d=tasks.filter(t=>t.status==='doing').length;
  const f=tasks.filter(t=>t.status==='done').length;
  const tot=tasks.length;
  const pct=tot?Math.round(f/tot*100):0;
  $('#sP').textContent=p;
  $('#sD').textContent=d;
  $('#sF').textContent=f;
  $('#pPct').textContent=pct+'%';
  $('#pBar').style.width=pct+'%';
}

// Category chips
function renderCats() {
  const cnt={};
  tasks.forEach(t=>{ if(t.status!=='done') cnt[t.category]=(cnt[t.category]||0)+1; });
  const all=tasks.filter(t=>t.status!=='done').length;

  let h=`<button class="chip ${aCat==='all'?'active':''}" data-c="all" style="--chip-c:var(--blue)">
    <span class="chip-icon"><svg><use href="#i-layers"/></svg></span>Todas<span class="chip-n">${all}</span></button>`;

  CATS.forEach(c=>{
    h+=`<button class="chip ${aCat===c.id?'active':''}" data-c="${c.id}" style="--chip-c:${c.color}">
      <span class="chip-icon"><svg style="color:${aCat===c.id?'#fff':c.color}"><use href="#${c.icon}"/></svg></span>
      ${c.name}<span class="chip-n">${cnt[c.id]||0}</span></button>`;
  });
  $('#cats').innerHTML=h;

  // select
  $('#fC').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

// Tasks
function renderTasks() {
  let list=tasks.filter(t=>{
    if(aCat!=='all'&&t.category!==aCat) return false;
    if(aSt!=='all'&&t.status!==aSt) return false;
    if(q) { const s=q.toLowerCase(); return t.title.toLowerCase().includes(s)||(t.notes||'').toLowerCase().includes(s); }
    return true;
  });

  const pr={alta:0,media:1,baixa:2};
  list.sort((a,b)=>{
    if(a.status==='done'&&b.status!=='done') return 1;
    if(a.status!=='done'&&b.status==='done') return -1;
    if(pr[a.priority]!==pr[b.priority]) return pr[a.priority]-pr[b.priority];
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    if(a.date) return -1; return 1;
  });

  if(!list.length) {
    $('#list').innerHTML=`<div class="task-empty">
      <div class="ei"><svg><use href="#i-inbox"/></svg></div>
      <h3>${q?'Nada encontrado':'Nenhuma tarefa'}</h3>
      <p>${q?'Tente outra busca':'Toque no + para criar'}</p></div>`;
    $('#list').style.background='transparent';
    return;
  }

  $('#list').style.background='';
  $('#list').innerHTML=list.map((t,i)=>{
    const c=ci(t.category);
    const od=isOD(t.date)&&t.status!=='done';
    const subs=t.subtasks||[];
    const sd=subs.filter(s=>s.done).length;

    // badge bg: 12% opacity of category color
    const bbg=c.color+'1A';

    return `<div class="item ${t.status==='done'?'completed':''}" style="animation-delay:${i*0.03}s">
      <div class="item-row">
        <button class="ck ${t.status==='done'?'on':''}" data-id="${t.id}">
          <svg><use href="#i-check"/></svg>
        </button>
        <div class="item-body">
          <div class="item-title">${t.title}</div>
          <div class="item-meta">
            <span class="badge badge-cat" style="--bc:${bbg};--bct:${c.color}">
              <svg width="11" height="11" style="color:${c.color}"><use href="#${c.icon}"/></svg>${c.name}
            </span>
            <span class="meta-txt"><span class="pdot ${t.priority}"></span>${t.priority==='alta'?'Alta':t.priority==='media'?'Média':'Baixa'}</span>
            ${t.date?`<span class="meta-txt ${od?'overdue':''}"><svg><use href="#i-cal"/></svg>${fDate(t.date)}</span>`:''}
            ${t.status==='doing'?`<span class="meta-txt doing"><svg><use href="#i-clock"/></svg>Fazendo</span>`:''}
            ${subs.length?`<span class="meta-txt">${sd}/${subs.length} subtarefas</span>`:''}
          </div>
        </div>
        <div class="item-acts">
          <button class="a-btn" onclick="edit('${t.id}')"><svg><use href="#i-edit"/></svg></button>
          <button class="a-btn del" onclick="askDel('${t.id}')"><svg><use href="#i-trash"/></svg></button>
        </div>
      </div>
      ${subs.length?`<div class="subs">${subs.map((s,si)=>`
        <div class="sub ${s.done?'done':''}">
          <button class="sub-ck ${s.done?'on':''}" data-t="${t.id}" data-s="${si}">
            <svg><use href="#i-check"/></svg>
          </button><span>${s.text}</span>
        </div>`).join('')}</div>`:''}
      ${t.notes?`<div class="note-preview">${t.notes}</div>`:''}
    </div>`;
  }).join('');
}

function render() { renderStats(); renderCats(); renderTasks(); }

// Modal
function openM(task) {
  const e=!!task;
  $('#mTitle').textContent=e?'Editar Tarefa':'Nova Tarefa';
  $('#fId').value=e?task.id:'';
  $('#fT').value=e?task.title:'';
  $('#fC').value=e?task.category:(aCat!=='all'?aCat:'solvay');
  $('#fP').value=e?task.priority:'media';
  $('#fD').value=e?task.date:'';
  $('#fS').value=e?task.status:'todo';
  $('#fN').value=e?(task.notes||''):'';
  mSubs=e?(task.subtasks||[]).map(s=>({...s})):[];
  renderMSubs();
  $('#ov').classList.add('open');
  $('#modal').classList.add('open');
  setTimeout(()=>$('#fT').focus(),350);
}
function closeM() { $('#ov').classList.remove('open'); $('#modal').classList.remove('open'); }

function renderMSubs() {
  $('#subList').innerHTML=mSubs.map((s,i)=>`
    <div class="sub-edit-row">
      <input type="text" value="${s.text}" placeholder="Subtarefa..." onchange="mSubs[${i}].text=this.value">
      <button type="button" class="sub-rm" onclick="mSubs.splice(${i},1);renderMSubs()">
        <svg width="14" height="14"><use href="#i-x"/></svg>
      </button>
    </div>`).join('');
}

function edit(id) { const t=tasks.find(x=>x.id===id); if(t) openM(t); }
function askDel(id) { delId=id; $('#cfWrap').classList.add('open'); }

function toggle(id) {
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const was=t.status==='done';
  t.status=was?'todo':'done';
  save(); render();
  if(!was) { pop(); toast('Tarefa concluída'); } else toast('Tarefa reaberta');
}
function toggleSub(tid,si) {
  const t=tasks.find(x=>x.id===tid);
  if(!t||!t.subtasks||!t.subtasks[si]) return;
  t.subtasks[si].done=!t.subtasks[si].done;
  save(); render();
}

// Events
$('#fab').addEventListener('click',()=>openM());
$('#mCancel').addEventListener('click',closeM);
$('#ov').addEventListener('click',closeM);

$('#addSub').addEventListener('click',()=>{
  mSubs.push({text:'',done:false}); renderMSubs();
  const inputs=$$('#subList input');
  if(inputs.length) inputs[inputs.length-1].focus();
});

$('#form').addEventListener('submit',e=>{
  e.preventDefault();
  const id=$('#fId').value;
  const data={
    id:id||uid(),
    title:$('#fT').value.trim(),
    category:$('#fC').value,
    priority:$('#fP').value,
    date:$('#fD').value,
    status:$('#fS').value,
    notes:$('#fN').value.trim(),
    subtasks:mSubs.filter(s=>s.text.trim()),
  };
  if(!data.title) return;
  if(id) { const idx=tasks.findIndex(t=>t.id===id); if(idx>=0) tasks[idx]=data; toast('Tarefa atualizada'); }
  else { tasks.unshift(data); toast('Tarefa criada'); }
  save(); closeM(); render();
});

$('#list').addEventListener('click',e=>{
  const ck=e.target.closest('.ck');
  if(ck) { e.stopPropagation(); toggle(ck.dataset.id); return; }
  const sk=e.target.closest('.sub-ck');
  if(sk) { e.stopPropagation(); toggleSub(sk.dataset.t,+sk.dataset.s); }
});

$('#cats').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  aCat=c.dataset.c; render();
});

$$('.seg').forEach(s=>{
  s.addEventListener('click',()=>{
    $$('.seg').forEach(x=>x.classList.remove('active'));
    s.classList.add('active'); aSt=s.dataset.s; renderTasks();
  });
});

$('#q').addEventListener('input',e=>{ q=e.target.value; renderTasks(); });

$('#cfYes').addEventListener('click',()=>{
  if(delId) { tasks=tasks.filter(t=>t.id!==delId); save(); render(); toast('Tarefa excluída'); }
  delId=null; $('#cfWrap').classList.remove('open');
});
$('#cfNo').addEventListener('click',()=>{ delId=null; $('#cfWrap').classList.remove('open'); });
$('#cfWrap').addEventListener('click',e=>{
  if(e.target===$('#cfWrap')) { delId=null; $('#cfWrap').classList.remove('open'); }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') { closeM(); $('#cfWrap').classList.remove('open'); }
  const tg=document.activeElement.tagName;
  if(e.key==='n'&&tg!=='INPUT'&&tg!=='TEXTAREA'&&tg!=='SELECT') openM();
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

setGreeting(); render();
</script>
</body>
</html>
