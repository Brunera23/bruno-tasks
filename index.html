<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Bruno Tasks — Gerenciador de tarefas pessoal">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Bruno Tasks</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f2f2f7;--card:#fff;--card-hover:#f8f8fa;
      --label:#000;--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.3);
      --label4:rgba(60,60,67,.12);--sep:rgba(60,60,67,.12);
      --fill:rgba(120,120,128,.12);
      --blue:#007AFF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;
      --pink:#FF2D55;--purple:#AF52DE;--cyan:#32ADE6;--gray2:#8E8E93;
      --indigo:#5856D6;--teal:#5AC8FA;--mint:#00C7BE;--brown:#A2845E;--yellow:#FFCC00;
      --r:12px;--r2:16px;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow2:0 4px 12px rgba(0,0,0,.08);
      --t:0.18s ease;--sidebar-w:260px;
    }
    html{height:100%}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--label);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;line-height:1.47}
    .svg-defs{display:none}

    /* ===== LAYOUT ===== */
    .shell{display:flex;min-height:100dvh}
    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--card);border-right:1px solid var(--sep);padding:28px 16px 20px;display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;overflow-y:auto}
    .sidebar-logo{font-size:1.2rem;font-weight:700;letter-spacing:-.03em;padding:0 8px;margin-bottom:28px;display:flex;align-items:center;gap:10px}
    .sidebar-logo .logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center}
    .sidebar-logo .logo-icon svg{width:18px;height:18px;color:#fff}
    .nav-section{margin-bottom:24px}
    .nav-label{font-size:.68rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.06em;padding:0 10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .nav-label-btn{width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:var(--label3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t)}
    .nav-label-btn:hover{background:var(--fill);color:var(--label)}
    .nav-label-btn svg{width:14px;height:14px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;font-size:.86rem;font-weight:500;color:var(--label2);cursor:pointer;transition:var(--t);border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
    .nav-item:hover{background:var(--fill);color:var(--label)}
    .nav-item.active{background:var(--blue);color:#fff}
    .nav-item.active svg{color:#fff}
    .nav-item svg{width:18px;height:18px;flex-shrink:0}
    .nav-item .nav-badge{margin-left:auto;font-size:.72rem;font-weight:600;background:var(--fill);border-radius:6px;padding:1px 7px;min-width:22px;text-align:center}
    .nav-item.active .nav-badge{background:rgba(255,255,255,.25)}
    .sidebar-cats{flex:1}
    .cat-nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:.82rem;font-weight:500;color:var(--label2);cursor:pointer;transition:var(--t);border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
    .cat-nav-item:hover{background:var(--fill)}
    .cat-nav-item.active{background:var(--fill);color:var(--label);font-weight:600}
    .cat-nav-item svg{width:15px;height:15px;flex-shrink:0}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cat-nav-item .nav-badge{margin-left:auto;font-size:.7rem;font-weight:600;color:var(--label3)}
    .main{flex:1;min-width:0;padding:28px 36px 40px;max-width:900px}

    /* ===== PAGE HEADER ===== */
    .page-head{margin-bottom:24px}
    .page-head .greeting{font-size:.82rem;font-weight:500;color:var(--label3);margin-bottom:2px}
    .page-head h1{font-size:1.85rem;font-weight:700;letter-spacing:-.04em}

    /* ===== COLLAPSIBLE STATS ===== */
    .stats-section{margin-bottom:20px}
    .stats-toggle{display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .stats-toggle h2{font-size:.82rem;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.04em}
    .stats-toggle .chevron{width:16px;height:16px;color:var(--label3);transition:transform .25s ease}
    .stats-toggle .chevron.collapsed{transform:rotate(-90deg)}
    .stats-body{overflow:hidden;transition:max-height .35s cubic-bezier(.25,1,.5,1),opacity .25s ease;max-height:300px;opacity:1}
    .stats-body.collapsed{max-height:0;opacity:0;margin-bottom:0}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .stat{background:var(--card);border-radius:var(--r);padding:16px 14px;box-shadow:var(--shadow)}
    .stat-val{font-size:1.7rem;font-weight:700;letter-spacing:-.03em;line-height:1}
    .stat-val.c-p{color:var(--blue)}.stat-val.c-d{color:var(--orange)}.stat-val.c-f{color:var(--green)}
    .stat-lbl{font-size:.7rem;font-weight:500;color:var(--label3);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
    .progress-row{display:flex;align-items:center;gap:12px}
    .progress-track{flex:1;height:4px;background:var(--fill);border-radius:2px;overflow:hidden}
    .progress-bar{height:100%;border-radius:2px;background:var(--blue);transition:width .5s cubic-bezier(.25,1,.5,1)}
    .progress-pct{font-size:.78rem;font-weight:600;color:var(--label2);min-width:34px;text-align:right}

    /* ===== MOBILE CATEGORY CHIPS ===== */
    .mob-cats{display:none;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}
    .mob-cats::-webkit-scrollbar{display:none}
    .m-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid var(--sep);color:var(--label2);font-size:.78rem;font-weight:500;cursor:pointer;transition:var(--t);font-family:inherit;box-shadow:var(--shadow)}
    .m-chip:hover{background:var(--card-hover)}
    .m-chip.active{background:var(--chip-c);color:#fff;border-color:transparent}
    .m-chip .chip-dot{width:7px;height:7px;border-radius:50%;background:var(--chip-c)}
    .m-chip.active .chip-dot{background:rgba(255,255,255,.4)}
    .m-chip-add{border-style:dashed;color:var(--label3)}
    .m-chip-add:hover{border-color:var(--blue);color:var(--blue)}
    .m-chip-add svg{width:14px;height:14px}

    /* ===== TOOLBAR ===== */
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .search-box{flex:1;min-width:200px;position:relative}
    .search-box input{width:100%;padding:10px 14px 10px 36px;background:var(--card);border:1px solid var(--sep);border-radius:10px;color:var(--label);font-family:inherit;font-size:.86rem;outline:none;transition:var(--t);box-shadow:var(--shadow)}
    .search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
    .search-box input::placeholder{color:var(--label3)}
    .search-box .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--label3)}
    .seg{display:flex;background:var(--fill);border-radius:10px;padding:3px}
    .seg button{padding:7px 14px;font-size:.78rem;font-weight:500;color:var(--label2);background:transparent;border:none;border-radius:8px;cursor:pointer;transition:var(--t);font-family:inherit;white-space:nowrap}
    .seg button.active{background:var(--card);color:var(--label);box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .btn-add{padding:9px 18px;border-radius:10px;background:var(--blue);color:#fff;border:none;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,122,255,.25)}
    .btn-add:hover{opacity:.9;transform:translateY(-1px)}
    .btn-add svg{width:16px;height:16px}

    /* ===== TASK LIST ===== */
    .tl{background:var(--card);border-radius:var(--r2);box-shadow:var(--shadow);overflow:hidden}
    .tl:empty{box-shadow:none;background:transparent}
    .task-empty{display:flex;flex-direction:column;align-items:center;padding:56px 20px;color:var(--label3)}
    .task-empty .ei{width:56px;height:56px;border-radius:50%;background:var(--fill);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .task-empty .ei svg{width:24px;height:24px;color:var(--label3)}
    .task-empty h3{font-size:.95rem;font-weight:600;color:var(--label2);margin-bottom:3px}
    .task-empty p{font-size:.82rem}
    .item{padding:14px 18px;transition:background .12s;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .item+.item{border-top:.5px solid var(--sep)}
    .item:hover{background:var(--card-hover)}
    .item.completed{opacity:.4}
    .item.completed .item-title{text-decoration:line-through;color:var(--label3)}
    .item-row{display:flex;align-items:flex-start;gap:12px}
    .ck{flex-shrink:0;width:22px;height:22px;margin-top:1px;border-radius:50%;border:2px solid var(--label3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1);color:transparent}
    .ck:hover{border-color:var(--blue)}
    .ck.on{border-color:var(--green);background:var(--green);color:#fff;animation:ckPop .35s cubic-bezier(.34,1.56,.64,1)}
    @keyframes ckPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
    .ck svg{width:12px;height:12px;stroke-width:3}
    .item-body{flex:1;min-width:0}
    .item-title{font-size:.88rem;font-weight:500;line-height:1.4;margin-bottom:5px}
    .item-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:600}
    .badge-cat{background:var(--bc);color:var(--bct)}
    .badge-cat svg{width:11px;height:11px}
    .meta-txt{font-size:.72rem;font-weight:500;color:var(--label3);display:inline-flex;align-items:center;gap:4px}
    .meta-txt svg{width:12px;height:12px}
    .meta-txt.overdue{color:var(--red)}
    .meta-txt.doing{color:var(--orange)}
    .pdot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .pdot.alta{background:var(--red);box-shadow:0 0 5px rgba(255,59,48,.35)}
    .pdot.media{background:var(--orange)}
    .pdot.baixa{background:var(--green)}
    .note-preview{margin:8px 0 0 34px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:.78rem;color:var(--label2);line-height:1.45}
    .subs{margin:8px 0 0 34px;display:flex;flex-direction:column;gap:2px}
    .sub{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.8rem;color:var(--label2)}
    .sub-ck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--label3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);color:transparent;flex-shrink:0}
    .sub-ck.on{border-color:var(--green);background:var(--green);color:#fff}
    .sub-ck svg{width:9px;height:9px;stroke-width:3}
    .sub.done span{text-decoration:line-through;color:var(--label3)}
    .item-acts{display:flex;gap:0;flex-shrink:0;opacity:0;transition:opacity .12s}
    .item:hover .item-acts{opacity:1}
    @media(hover:none){.item-acts{opacity:1}}
    .a-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--label3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t)}
    .a-btn:hover{background:var(--fill);color:var(--label)}
    .a-btn.del:hover{color:var(--red)}
    .a-btn svg{width:15px;height:15px}

    /* ===== DASHBOARD ===== */
    .dash{display:none}.dash.active{display:block}
    .tasks-view{display:none}.tasks-view.active{display:block}
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
    .dash-card{background:var(--card);border-radius:var(--r2);padding:18px;box-shadow:var(--shadow)}
    .dash-card .dc-label{font-size:.7rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .dash-card .dc-label svg{width:14px;height:14px}
    .dash-card .dc-val{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;line-height:1}
    .dash-card .dc-sub{font-size:.72rem;color:var(--label3);margin-top:4px}
    .dash-section{margin-bottom:28px}
    .dash-section h2{font-size:1rem;font-weight:700;margin-bottom:14px;letter-spacing:-.02em}
    .chart-wrap{background:var(--card);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow)}
    .bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:8px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
    .bar{width:100%;border-radius:6px 6px 0 0;background:var(--blue);transition:height .5s cubic-bezier(.25,1,.5,1);min-height:2px}
    .bar-val{font-size:.68rem;font-weight:600;color:var(--label2)}
    .bar-lbl{font-size:.65rem;color:var(--label3);font-weight:500}
    .cat-bars{display:flex;flex-direction:column;gap:10px}
    .cat-bar-row{display:flex;align-items:center;gap:10px}
    .cat-bar-name{width:120px;font-size:.78rem;font-weight:500;color:var(--label2);display:flex;align-items:center;gap:6px;flex-shrink:0}
    .cat-bar-name svg{width:14px;height:14px}
    .cat-bar-track{flex:1;height:8px;background:var(--fill);border-radius:4px;overflow:hidden}
    .cat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
    .cat-bar-num{font-size:.72rem;font-weight:600;color:var(--label3);width:28px;text-align:right}
    .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .donut{width:100px;height:100px;border-radius:50%;position:relative;flex-shrink:0}
    .donut-center{position:absolute;inset:18px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700}
    .donut-legend{display:flex;flex-direction:column;gap:8px}
    .donut-leg-item{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--label2)}
    .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
    .feed{background:var(--card);border-radius:var(--r2);box-shadow:var(--shadow);overflow:hidden;max-height:320px;overflow-y:auto}
    .feed-item{padding:12px 18px;display:flex;align-items:center;gap:12px;font-size:.82rem}
    .feed-item+.feed-item{border-top:.5px solid var(--sep)}
    .feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .feed-text{flex:1;color:var(--label2)}.feed-text strong{color:var(--label);font-weight:600}
    .feed-time{font-size:.7rem;color:var(--label3);white-space:nowrap}
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}

    /* ===== FAB ===== */
    .fab{display:none;position:fixed;bottom:84px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--blue);border:none;color:#fff;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,122,255,.35);transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:90}
    .fab svg{width:22px;height:22px;transition:transform .2s}
    .fab:hover svg{transform:rotate(90deg)}
    .fab:active{transform:scale(.92)}

    /* ===== MODALS ===== */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .2s}
    .overlay.open{opacity:1;pointer-events:all}
    .modal{position:fixed;z-index:201;top:50%;left:50%;transform:translate(-50%,-48%) scale(.96);opacity:0;background:var(--card);border-radius:var(--r2);padding:28px;max-width:460px;width:92%;max-height:88dvh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.15);transition:all .3s cubic-bezier(.25,1,.5,1);pointer-events:none}
    .modal.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all}
    @media(max-width:640px){
      .modal{top:auto;bottom:0;left:0;right:0;transform:translateY(100%);border-radius:16px 16px 0 0;width:100%;max-width:100%}
      .modal.open{transform:translateY(0);opacity:1}
    }
    .m-bar{width:36px;height:4px;border-radius:2px;background:var(--fill);margin:0 auto 16px}
    @media(min-width:641px){.m-bar{display:none}}
    .m-title{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;margin-bottom:20px}
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:.72rem;font-weight:600;color:var(--label3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
    .fld input,.fld select,.fld textarea{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--sep);border-radius:10px;color:var(--label);font-family:inherit;font-size:.86rem;outline:none;transition:var(--t)}
    .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
    .fld select{cursor:pointer}.fld textarea{resize:vertical;min-height:52px}
    .fld-row{display:flex;gap:10px}.fld-row .fld{flex:1}
    .sub-edit-section{margin-bottom:14px}
    .sub-edit-section>label{display:block;font-size:.72rem;font-weight:600;color:var(--label3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
    .sub-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    .sub-edit-row{display:flex;align-items:center;gap:8px}
    .sub-edit-row input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--sep);border-radius:8px;color:var(--label);font-family:inherit;font-size:.82rem;outline:none}
    .sub-edit-row input:focus{border-color:var(--blue)}
    .sub-rm{width:28px;height:28px;border-radius:7px;border:none;background:transparent;color:var(--label3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t)}
    .sub-rm:hover{color:var(--red);background:rgba(255,59,48,.08)}
    .add-sub-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;background:transparent;border:1px dashed var(--sep);border-radius:8px;color:var(--label3);font-size:.8rem;cursor:pointer;transition:var(--t);font-family:inherit;width:100%}
    .add-sub-btn:hover{border-color:var(--blue);color:var(--blue)}
    .m-btns{display:flex;gap:10px;margin-top:22px}
    .btn{flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:600;border:none;cursor:pointer;transition:var(--t)}
    .btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
    .btn-sec{background:var(--fill);color:var(--label2)}.btn-sec:hover{background:var(--sep)}
    .btn-red{background:var(--red);color:#fff}

    /* ===== CATEGORY MANAGER ===== */
    .cat-mgr-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .cat-mgr-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px}
    .cat-mgr-item .cat-dot{width:10px;height:10px}
    .cat-mgr-item svg{width:16px;height:16px;flex-shrink:0}
    .cat-mgr-item .cat-mgr-name{flex:1;font-size:.86rem;font-weight:500}
    .cat-mgr-item .cat-mgr-actions{display:flex;gap:2px}

    /* Icon picker */
    .icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px}
    .icon-opt{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid transparent;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t)}
    .icon-opt:hover{background:var(--fill)}
    .icon-opt.active{border-color:var(--blue);background:rgba(0,122,255,.08)}
    .icon-opt svg{width:18px;height:18px;color:var(--label2)}
    .icon-opt.active svg{color:var(--blue)}

    /* Color picker */
    .color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:var(--t);position:relative}
    .color-opt:hover{transform:scale(1.15)}
    .color-opt.active{border-color:var(--label)}
    .color-opt.active::after{content:'';position:absolute;inset:3px;border-radius:50%;border:2px solid var(--card)}

    /* ===== CONFIRM ===== */
    .cf-wrap{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
    .cf-wrap.open{display:flex}
    .cf-box{background:var(--card);border-radius:14px;padding:24px;text-align:center;max-width:300px;width:85%;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:fadeUp .2s ease}
    .cf-box h3{font-size:.95rem;font-weight:600;margin-bottom:4px}
    .cf-box p{color:var(--label2);font-size:.84rem;margin-bottom:18px}

    /* ===== TOAST ===== */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--label);color:var(--card);padding:10px 20px;border-radius:12px;font-size:.84rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:400;opacity:0;transition:all .3s cubic-bezier(.25,1,.5,1);pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ===== MOBILE NAV ===== */
    .mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--sep);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:80}
    .mob-nav-inner{display:flex;justify-content:space-around}
    .mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;border:none;background:transparent;color:var(--label3);font-size:.62rem;font-weight:500;cursor:pointer;font-family:inherit;transition:var(--t)}
    .mob-tab.active{color:var(--blue)}
    .mob-tab svg{width:22px;height:22px}

    @media(max-width:768px){
      .sidebar{display:none}.main{padding:16px 16px 120px}.fab{display:flex}.mob-nav{display:block}
      .btn-add{display:none}.page-head h1{font-size:1.5rem}
      .mob-cats{display:flex}.dash-grid{grid-template-columns:repeat(2,1fr)}
      .charts-row{grid-template-columns:1fr}.donut-wrap{justify-content:center}
      .toast{bottom:90px}
    }
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--sep);border-radius:3px}
  </style>
</head>

    </button>

<script>
// ===== ICONS & COLORS =====
const ICONS=['i-heart','i-building','i-droplet','i-rocket','i-home','i-wallet','i-user','i-briefcase','i-star','i-book','i-cart','i-code','i-car','i-globe','i-coffee','i-bulb','i-flag','i-music','i-camera','i-target','i-zap','i-fire','i-layers','i-activity'];
const COLORS=['#007AFF','#34C759','#FF9500','#FF3B30','#FF2D55','#AF52DE','#32ADE6','#5856D6','#5AC8FA','#00C7BE','#8E8E93','#A2845E','#FFCC00','#30B0C7','#FF6482'];

const DEF_CATS=[
  {id:'familia',name:'Família',icon:'i-heart',color:'#FF2D55'},
  {id:'solvay',name:'Solvay',icon:'i-building',color:'#32ADE6'},
  {id:'manual',name:'Manual do Óleo',icon:'i-droplet',color:'#FF9500'},
  {id:'revviu',name:'Revviu',icon:'i-rocket',color:'#AF52DE'},
  {id:'imobiliario',name:'Imobiliário',icon:'i-home',color:'#34C759'},
  {id:'financeiro',name:'Financeiro',icon:'i-wallet',color:'#FF3B30'},
  {id:'pessoal',name:'Pessoal',icon:'i-user',color:'#8E8E93'},
];
const DEF_TASKS=[
  {id:uid(),title:'Efetivar o empréstimo',category:'financeiro',priority:'alta',status:'todo',date:'',notes:'',subtasks:[],createdAt:Date.now()-86400000,completedAt:null},
  {id:uid(),title:'Tarefa PID',category:'solvay',priority:'media',status:'todo',date:'',notes:'',subtasks:[],createdAt:Date.now()-72000000,completedAt:null},
  {id:uid(),title:'Adicionar WhatsApp do site',category:'manual',priority:'media',status:'todo',date:'',notes:'',subtasks:[],createdAt:Date.now()-50000000,completedAt:null},
  {id:uid(),title:'Agrupar métricas de acompanhamento e dashboards do site',category:'manual',priority:'media',status:'todo',date:'',notes:'',subtasks:[],createdAt:Date.now()-30000000,completedAt:null},
];

// ===== STATE =====
let cats=ld('bt-cats',DEF_CATS);
let tasks=ld('bt-v5',DEF_TASKS);
let log=ld('bt-log',[]);
let aCat='all',aSt='all',qry='',delId=null,mSubs=[],curView='tasks';
let statsCollapsed=localStorage.getItem('bt-stats-collapsed')==='1';
let editingCatId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function ld(k,def){const d=localStorage.getItem(k);if(d)return JSON.parse(d);sv(k,def);return JSON.parse(JSON.stringify(def))}
function sv(k,d){localStorage.setItem(k,JSON.stringify(d))}
function sT(){sv('bt-v5',tasks)}
function sC(){sv('bt-cats',cats)}
function sL(){sv('bt-log',log)}
function ci(id){return cats.find(c=>c.id===id)||{name:id,icon:'i-layers',color:'#8E8E93'}}
function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
function fDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
function isOD(d){if(!d)return false;const t=new Date();t.setHours(0,0,0,0);return new Date(d+'T00:00:00')<t}
function addLog(type,t){log.unshift({type,taskId:t.id,title:t.title,category:t.category,ts:Date.now()});if(log.length>200)log=log.slice(0,200);sL()}
function relTime(ts){const d=Date.now()-ts,s=d/1000,m=s/60,h=m/60,dy=h/24;if(s<60)return'agora';if(m<60)return Math.floor(m)+'min';if(h<24)return Math.floor(h)+'h';if(dy<7)return Math.floor(dy)+'d';return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}

// ===== GREETING =====
function setGreeting(){
  const h=new Date().getHours();let g='Boa noite, Bruno';
  if(h>=5&&h<12)g='Bom dia, Bruno';else if(h>=12&&h<18)g='Boa tarde, Bruno';
  const ds=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const txt=g+' · '+ds.charAt(0).toUpperCase()+ds.slice(1);
  $('#greeting').textContent=txt;$('#greeting2').textContent=txt;
}

// ===== STATS COLLAPSE =====
function applyStatsCollapse(){
  const body=$('#statsBody'),chev=$('#statsChevron');
  if(statsCollapsed){body.classList.add('collapsed');chev.classList.add('collapsed')}
  else{body.classList.remove('collapsed');chev.classList.remove('collapsed')}
}
$('#statsToggle').addEventListener('click',()=>{
  statsCollapsed=!statsCollapsed;
  localStorage.setItem('bt-stats-collapsed',statsCollapsed?'1':'0');
  applyStatsCollapse();
});

// ===== VIEW SWITCH =====
function switchView(v){
  curView=v;
  $('#tasksView').classList.toggle('active',v==='tasks');
  $('#dashView').classList.toggle('active',v==='dash');
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
  $$('.mob-tab[data-view]').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
  if(v==='dash')renderDash();
}

// ===== RENDER CATS =====
function renderCatNav(){
  const cnt={};tasks.forEach(t=>{if(t.status!=='done')cnt[t.category]=(cnt[t.category]||0)+1});
  const all=tasks.filter(t=>t.status!=='done').length;
  $('#navBadge').textContent=all;

  let h=`<button class="cat-nav-item ${aCat==='all'?'active':''}" data-c="all"><span class="cat-dot" style="background:var(--blue)"></span>Todas<span class="nav-badge">${all}</span></button>`;
  cats.forEach(c=>{h+=`<button class="cat-nav-item ${aCat===c.id?'active':''}" data-c="${c.id}"><span class="cat-dot" style="background:${c.color}"></span>${c.name}<span class="nav-badge">${cnt[c.id]||0}</span></button>`});
  $('#catNav').innerHTML=h;

  // Mobile chips
  let mc=`<button class="m-chip ${aCat==='all'?'active':''}" data-c="all" style="--chip-c:var(--blue)"><span class="chip-dot"></span>Todas</button>`;
  cats.forEach(c=>{mc+=`<button class="m-chip ${aCat===c.id?'active':''}" data-c="${c.id}" style="--chip-c:${c.color}"><span class="chip-dot"></span>${c.name}</button>`});
  mc+=`<button class="m-chip m-chip-add" id="mobAddCat"><svg><use href="#i-plus"/></svg></button>`;
  $('#mobCats').innerHTML=mc;

  // Cat select
  $('#fC').innerHTML=cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

// ===== RENDER TASKS =====
function renderStats(){
  const p=tasks.filter(t=>t.status==='todo').length;
  const d=tasks.filter(t=>t.status==='doing').length;
  const f=tasks.filter(t=>t.status==='done').length;
  const tot=tasks.length;const pct=tot?Math.round(f/tot*100):0;
  $('#sP').textContent=p;$('#sD').textContent=d;$('#sF').textContent=f;
  $('#pPct').textContent=pct+'%';$('#pBar').style.width=pct+'%';
}

function renderTasks(){
  let list=tasks.filter(t=>{
    if(aCat!=='all'&&t.category!==aCat)return false;
    if(aSt!=='all'&&t.status!==aSt)return false;
    if(qry){const s=qry.toLowerCase();return t.title.toLowerCase().includes(s)||(t.notes||'').toLowerCase().includes(s)}
    return true;
  });
  const pr={alta:0,media:1,baixa:2};
  list.sort((a,b)=>{if(a.status==='done'&&b.status!=='done')return 1;if(a.status!=='done'&&b.status==='done')return-1;if(pr[a.priority]!==pr[b.priority])return pr[a.priority]-pr[b.priority];if(a.date&&b.date)return a.date.localeCompare(b.date);if(a.date)return-1;return 1});
  if(aCat!=='all'){const c=ci(aCat);$('#pageTitle').textContent=c.name}else{$('#pageTitle').textContent='Tarefas'}
  if(!list.length){$('#list').innerHTML=`<div class="task-empty"><div class="ei"><svg><use href="#i-inbox"/></svg></div><h3>${qry?'Nada encontrado':'Nenhuma tarefa'}</h3><p>${qry?'Tente outra busca':'Toque em "Nova tarefa" para criar'}</p></div>`;return}
  $('#list').innerHTML=list.map((t,i)=>{
    const c=ci(t.category);const od=isOD(t.date)&&t.status!=='done';const subs=t.subtasks||[];const sd=subs.filter(s=>s.done).length;
    return`<div class="item ${t.status==='done'?'completed':''}" style="animation-delay:${i*.03}s"><div class="item-row"><button class="ck ${t.status==='done'?'on':''}" data-id="${t.id}"><svg><use href="#i-check"/></svg></button><div class="item-body"><div class="item-title">${t.title}</div><div class="item-meta"><span class="badge badge-cat" style="--bc:${c.color}14;--bct:${c.color}"><svg style="color:${c.color}"><use href="#${c.icon}"/></svg>${c.name}</span><span class="meta-txt"><span class="pdot ${t.priority}"></span>${t.priority==='alta'?'Alta':t.priority==='media'?'Média':'Baixa'}</span>${t.date?`<span class="meta-txt ${od?'overdue':''}"><svg><use href="#i-cal"/></svg>${fDate(t.date)}</span>`:''}${t.status==='doing'?`<span class="meta-txt doing"><svg><use href="#i-clock"/></svg>Fazendo</span>`:''}${subs.length?`<span class="meta-txt">${sd}/${subs.length} subtarefas</span>`:''}</div></div><div class="item-acts"><button class="a-btn" onclick="edit('${t.id}')"><svg><use href="#i-edit"/></svg></button><button class="a-btn del" onclick="askDel('${t.id}')"><svg><use href="#i-trash"/></svg></button></div></div>${subs.length?`<div class="subs">${subs.map((s,si)=>`<div class="sub ${s.done?'done':''}"><button class="sub-ck ${s.done?'on':''}" data-t="${t.id}" data-s="${si}"><svg><use href="#i-check"/></svg></button><span>${s.text}</span></div>`).join('')}</div>`:''}${t.notes?`<div class="note-preview">${t.notes}</div>`:''}</div>`;
  }).join('');
}

function render(){renderStats();renderCatNav();renderTasks();if(curView==='dash')renderDash()}

// ===== DASHBOARD =====
function renderDash(){
  const total=tasks.length;const done=tasks.filter(t=>t.status==='done').length;
  const doing=tasks.filter(t=>t.status==='doing').length;
  const overdue=tasks.filter(t=>isOD(t.date)&&t.status!=='done').length;
  const pct=total?Math.round(done/total*100):0;
  let streak=0;const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<60;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.getTime();const de=ds+864e5;const has=tasks.some(t=>t.completedAt&&t.completedAt>=ds&&t.completedAt<de);if(has)streak++;else if(i>0)break}
  const completed=tasks.filter(t=>t.completedAt&&t.createdAt);
  let avgDays=0;if(completed.length){avgDays=Math.round(completed.reduce((s,t)=>s+(t.completedAt-t.createdAt),0)/completed.length/864e5)}
  $('#dashCards').innerHTML=`
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--blue)"><use href="#i-layers"/></svg>Total</div><div class="dc-val">${total}</div><div class="dc-sub">tarefas criadas</div></div>
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--green)"><use href="#i-check"/></svg>Concluídas</div><div class="dc-val" style="color:var(--green)">${pct}%</div><div class="dc-sub">${done} de ${total}</div></div>
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--orange)"><use href="#i-fire"/></svg>Sequência</div><div class="dc-val" style="color:var(--orange)">${streak}</div><div class="dc-sub">${streak===1?'dia consecutivo':'dias consecutivos'}</div></div>
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--red)"><use href="#i-alert"/></svg>Atrasadas</div><div class="dc-val" style="color:${overdue?'var(--red)':'var(--green)'}">${overdue}</div><div class="dc-sub">${overdue?'precisam de atenção':'tudo em dia'}</div></div>
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--cyan)"><use href="#i-clock"/></svg>Em progresso</div><div class="dc-val" style="color:var(--cyan)">${doing}</div><div class="dc-sub">tarefas ativas</div></div>
    <div class="dash-card"><div class="dc-label"><svg style="color:var(--purple)"><use href="#i-zap"/></svg>Tempo médio</div><div class="dc-val" style="color:var(--purple)">${avgDays||'--'}</div><div class="dc-sub">${avgDays?'dias para concluir':'sem dados'}</div></div>`;
  // Weekly
  const weeks=[];for(let w=7;w>=0;w--){const end=new Date(today);end.setDate(end.getDate()-w*7);end.setHours(23,59,59,999);const start=new Date(end);start.setDate(start.getDate()-6);start.setHours(0,0,0,0);const count=tasks.filter(t=>t.completedAt&&t.completedAt>=start.getTime()&&t.completedAt<=end.getTime()).length;weeks.push({count,lbl:start.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})})}
  const maxW=Math.max(...weeks.map(w=>w.count),1);
  $('#weekChart').innerHTML=weeks.map(w=>`<div class="bar-col"><div class="bar-val">${w.count}</div><div class="bar" style="height:${Math.max(w.count/maxW*120,2)}px"></div><div class="bar-lbl">${w.lbl}</div></div>`).join('');
  // Cats
  const cc={};tasks.forEach(t=>cc[t.category]=(cc[t.category]||0)+1);const mx=Math.max(...Object.values(cc),1);
  $('#catChart').innerHTML=cats.map(c=>`<div class="cat-bar-row"><div class="cat-bar-name"><svg style="color:${c.color}"><use href="#${c.icon}"/></svg>${c.name}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.max((cc[c.id]||0)/mx*100,2)}%;background:${c.color}"></div></div><div class="cat-bar-num">${cc[c.id]||0}</div></div>`).join('');
  // Priority
  const pH=tasks.filter(t=>t.priority==='alta'&&t.status!=='done').length;const pM=tasks.filter(t=>t.priority==='media'&&t.status!=='done').length;const pL=tasks.filter(t=>t.priority==='baixa'&&t.status!=='done').length;const pT=pH+pM+pL||1;
  const ps=[pH/pT*100,pM/pT*100,pL/pT*100];
  $('#prioChart').innerHTML=`<div class="donut" style="background:conic-gradient(var(--red) 0% ${ps[0]}%,var(--orange) ${ps[0]}% ${ps[0]+ps[1]}%,var(--green) ${ps[0]+ps[1]}% 100%)"><div class="donut-center">${pH+pM+pL}</div></div><div class="donut-legend"><div class="donut-leg-item"><div class="leg-dot" style="background:var(--red)"></div>Alta: ${pH}</div><div class="donut-leg-item"><div class="leg-dot" style="background:var(--orange)"></div>Média: ${pM}</div><div class="donut-leg-item"><div class="leg-dot" style="background:var(--green)"></div>Baixa: ${pL}</div></div>`;
  // Feed
  const feed=log.slice(0,30);
  const tc={create:'var(--blue)',complete:'var(--green)',reopen:'var(--orange)',edit:'var(--purple)',delete:'var(--red)'};
  const tl={create:'criou',complete:'concluiu',reopen:'reabriu',edit:'editou',delete:'excluiu'};
  $('#feedList').innerHTML=feed.length?feed.map(f=>`<div class="feed-item"><div class="feed-dot" style="background:${tc[f.type]||'var(--gray2)'}"></div><div class="feed-text">Você ${tl[f.type]||f.type} <strong>${f.title}</strong></div><div class="feed-time">${relTime(f.ts)}</div></div>`).join(''):'<div class="task-empty" style="padding:32px"><p>Nenhuma atividade ainda</p></div>';
}

// ===== TASK MODAL =====
function openM(task){
  const e=!!task;$('#mTitle').textContent=e?'Editar Tarefa':'Nova Tarefa';
  $('#fId').value=e?task.id:'';$('#fT').value=e?task.title:'';
  $('#fC').value=e?task.category:(aCat!=='all'?aCat:cats[0]?.id||'');
  $('#fP').value=e?task.priority:'media';$('#fD').value=e?task.date:'';
  $('#fS').value=e?task.status:'todo';$('#fN').value=e?(task.notes||''):'';
  mSubs=e?(task.subtasks||[]).map(s=>({...s})):[];renderMSubs();
  $('#ov').classList.add('open');$('#modal').classList.add('open');
  setTimeout(()=>$('#fT').focus(),350);
}
function closeM(){$('#ov').classList.remove('open');$('#modal').classList.remove('open')}
function renderMSubs(){$('#subList').innerHTML=mSubs.map((s,i)=>`<div class="sub-edit-row"><input type="text" value="${s.text}" placeholder="Subtarefa..." onchange="mSubs[${i}].text=this.value"><button type="button" class="sub-rm" onclick="mSubs.splice(${i},1);renderMSubs()"><svg width="14" height="14"><use href="#i-x"/></svg></button></div>`).join('')}
function edit(id){const t=tasks.find(x=>x.id===id);if(t)openM(t)}
function askDel(id){delId=id;$('#cfTitle').textContent='Excluir Tarefa';$('#cfMsg').textContent='Essa ação não pode ser desfeita.';$('#cfWrap').classList.add('open');$('#cfYes').onclick=()=>{if(delId){const t=tasks.find(x=>x.id===delId);if(t)addLog('delete',t);tasks=tasks.filter(t=>t.id!==delId);sT();render();toast('Tarefa excluída')}delId=null;$('#cfWrap').classList.remove('open')}}
function toggle(id){const t=tasks.find(x=>x.id===id);if(!t)return;const was=t.status==='done';t.status=was?'todo':'done';t.completedAt=was?null:Date.now();addLog(was?'reopen':'complete',t);sT();render();toast(was?'Tarefa reaberta':'Tarefa concluída')}
function toggleSub(tid,si){const t=tasks.find(x=>x.id===tid);if(!t||!t.subtasks||!t.subtasks[si])return;t.subtasks[si].done=!t.subtasks[si].done;sT();render()}

// ===== CATEGORY MANAGER =====
function openCatMgr(){
  $('#catMgrView').style.display='';$('#catEditView').style.display='none';
  $('#catModalTitle').textContent='Categorias';
  renderCatMgrList();
  $('#ovCat').classList.add('open');$('#modalCat').classList.add('open');
}
function closeCatMgr(){$('#ovCat').classList.remove('open');$('#modalCat').classList.remove('open')}

function renderCatMgrList(){
  $('#catMgrList').innerHTML=cats.map(c=>`
    <div class="cat-mgr-item">
      <span class="cat-dot" style="background:${c.color}"></span>
      <svg style="color:${c.color}"><use href="#${c.icon}"/></svg>
      <span class="cat-mgr-name">${c.name}</span>
      <div class="cat-mgr-actions">
        <button class="a-btn" onclick="editCat('${c.id}')"><svg><use href="#i-edit"/></svg></button>
        <button class="a-btn del" onclick="delCat('${c.id}')"><svg><use href="#i-trash"/></svg></button>
      </div>
    </div>`).join('');
}

function openCatEdit(cat){
  editingCatId=cat?cat.id:null;
  $('#catMgrView').style.display='none';$('#catEditView').style.display='';
  $('#catModalTitle').textContent=cat?'Editar Categoria':'Nova Categoria';
  $('#ceN').value=cat?cat.name:'';
  const selIcon=cat?cat.icon:'i-star';
  const selColor=cat?cat.color:'#007AFF';
  $('#ceIcons').innerHTML=ICONS.map(ic=>`<button type="button" class="icon-opt ${ic===selIcon?'active':''}" data-icon="${ic}"><svg><use href="#${ic}"/></svg></button>`).join('');
  $('#ceColors').innerHTML=COLORS.map(co=>`<button type="button" class="color-opt ${co===selColor?'active':''}" data-color="${co}" style="background:${co}"></button>`).join('');
  setTimeout(()=>$('#ceN').focus(),200);
}
function editCat(id){const c=cats.find(x=>x.id===id);if(c)openCatEdit(c)}
function delCat(id){
  closeCatMgr();
  delId=id;$('#cfTitle').textContent='Excluir Categoria';$('#cfMsg').textContent='As tarefas desta categoria serão mantidas.';
  $('#cfWrap').classList.add('open');
  $('#cfYes').onclick=()=>{cats=cats.filter(c=>c.id!==id);sC();render();toast('Categoria excluída');$('#cfWrap').classList.remove('open');openCatMgr()}
}

// Icon/color selection
$('#ceIcons').addEventListener('click',e=>{const o=e.target.closest('.icon-opt');if(!o)return;$$('#ceIcons .icon-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active')});
$('#ceColors').addEventListener('click',e=>{const o=e.target.closest('.color-opt');if(!o)return;$$('#ceColors .color-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active')});

$('#ceSave').addEventListener('click',()=>{
  const name=$('#ceN').value.trim();if(!name)return;
  const icon=$('#ceIcons .icon-opt.active')?.dataset.icon||'i-star';
  const color=$('#ceColors .color-opt.active')?.dataset.color||'#007AFF';
  if(editingCatId){
    const c=cats.find(x=>x.id===editingCatId);if(c){c.name=name;c.icon=icon;c.color=color}
    toast('Categoria atualizada');
  }else{
    const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+uid().slice(-3);
    cats.push({id,name,icon,color});
    toast('Categoria criada');
  }
  sC();render();
  $('#catMgrView').style.display='';$('#catEditView').style.display='none';
  $('#catModalTitle').textContent='Categorias';renderCatMgrList();
});
$('#ceBack').addEventListener('click',()=>{$('#catMgrView').style.display='';$('#catEditView').style.display='none';$('#catModalTitle').textContent='Categorias'});

// ===== EVENTS =====
$('#fab').addEventListener('click',()=>openM());
$('#btnAdd').addEventListener('click',()=>openM());
$('#mCancel').addEventListener('click',closeM);
$('#ov').addEventListener('click',closeM);
$('#addSub').addEventListener('click',()=>{mSubs.push({text:'',done:false});renderMSubs();const ins=$$('#subList input');if(ins.length)ins[ins.length-1].focus()});

$('#form').addEventListener('submit',e=>{
  e.preventDefault();const id=$('#fId').value;const isNew=!id;
  const data={id:id||uid(),title:$('#fT').value.trim(),category:$('#fC').value,priority:$('#fP').value,date:$('#fD').value,status:$('#fS').value,notes:$('#fN').value.trim(),subtasks:mSubs.filter(s=>s.text.trim()),createdAt:isNew?Date.now():(tasks.find(t=>t.id===id)?.createdAt||Date.now()),completedAt:$('#fS').value==='done'?Date.now():null};
  if(!data.title)return;
  if(id){const idx=tasks.findIndex(t=>t.id===id);if(idx>=0)tasks[idx]=data;addLog('edit',data);toast('Tarefa atualizada')}
  else{tasks.unshift(data);addLog('create',data);toast('Tarefa criada')}
  sT();closeM();render();
});

$('#list').addEventListener('click',e=>{const ck=e.target.closest('.ck');if(ck){e.stopPropagation();toggle(ck.dataset.id);return}const sk=e.target.closest('.sub-ck');if(sk){e.stopPropagation();toggleSub(sk.dataset.t,+sk.dataset.s)}});
$('#catNav').addEventListener('click',e=>{const c=e.target.closest('.cat-nav-item');if(!c)return;aCat=c.dataset.c;render()});
$('#mobCats').addEventListener('click',e=>{const c=e.target.closest('.m-chip[data-c]');if(c){aCat=c.dataset.c;render();return}if(e.target.closest('#mobAddCat'))openCatMgr()});
$$('.seg button').forEach(s=>{s.addEventListener('click',()=>{$$('.seg button').forEach(x=>x.classList.remove('active'));s.classList.add('active');aSt=s.dataset.s;renderTasks()})});
$$('.nav-item').forEach(n=>{n.addEventListener('click',()=>switchView(n.dataset.view))});
$$('.mob-tab[data-view]').forEach(n=>{n.addEventListener('click',()=>switchView(n.dataset.view))});
$('#q').addEventListener('input',e=>{qry=e.target.value;renderTasks()});
$('#cfNo').addEventListener('click',()=>{delId=null;$('#cfWrap').classList.remove('open')});
$('#cfWrap').addEventListener('click',e=>{if(e.target===$('#cfWrap')){delId=null;$('#cfWrap').classList.remove('open')}});

// Cat manager
$('#catMgrBtn').addEventListener('click',openCatMgr);
$('#mobCatMgr').addEventListener('click',openCatMgr);
$('#catAddBtn').addEventListener('click',()=>openCatEdit(null));
$('#catClose').addEventListener('click',closeCatMgr);
$('#ovCat').addEventListener('click',closeCatMgr);

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeM();closeCatMgr();$('#cfWrap').classList.remove('open')}const tg=document.activeElement.tagName;if(e.key==='n'&&tg!=='INPUT'&&tg!=='TEXTAREA'&&tg!=='SELECT')openM()});

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
setGreeting();applyStatsCollapse();render();
</script>
</body>
</html>
